<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEVANA</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: 100%;
      height: 100%;
    }

    .glitch {
      position: relative;
      margin: 0;
      color: #fff;
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-align: center;
      animation: glitch-skew 1s infinite linear alternate-reverse;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      overflow: hidden;
    }

    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 red;
      clip-path: inset(0 0 50% 0);
      animation: glitch-top 0.8s infinite linear alternate-reverse;
    }

    .glitch::after {
      left: -2px;
      text-shadow: -2px 0 cyan;
      clip-path: inset(50% 0 0 0);
      animation: glitch-bottom 1s infinite linear alternate-reverse;
    }

    @keyframes glitch-top {
      0% {
        transform: translate(0);
      }
      20% {
        transform: translate(-2px, -2px);
      }
      40% {
        transform: translate(2px, 2px);
      }
      60% {
        transform: translate(-1px, 1px);
      }
      80% {
        transform: translate(1px, -1px);
      }
      100% {
        transform: translate(0);
      }
    }

    @keyframes glitch-bottom {
      0% {
        transform: translate(0);
      }
      20% {
        transform: translate(2px, 1px);
      }
      40% {
        transform: translate(-2px, -1px);
      }
      60% {
        transform: translate(1px, -2px);
      }
      80% {
        transform: translate(-1px, 2px);
      }
      100% {
        transform: translate(0);
      }
    }

    @keyframes glitch-skew {
      0% {
        transform: skew(0deg);
      }
      20% {
        transform: skew(1deg);
      }
      40% {
        transform: skew(-1deg);
      }
      60% {
        transform: skew(0.5deg);
      }
      80% {
        transform: skew(-0.5deg);
      }
      100% {
        transform: skew(0deg);
      }
    }

    img {
      max-width: 100%;
      max-height: 75vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="glitch" data-text="LEVANA">LEVANA</h1>
    <img
      src="https://user-images.githubusercontent.com/14011726/94132137-7d4fc100-fe7c-11ea-8512-69f90cb65e48.gif"
      alt="GIF LEVANA"
    />
  </div>
</body>
</html>
