<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>LEVANA</title>

<style>
html,body{
margin:0;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
}

canvas{
max-width:90vw;
margin-bottom:20px;
}

img{
max-width:100%;
max-height:70vh;
object-fit:contain;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<img
src="https://user-images.githubusercontent.com/14011726/94132137-7d4fc100-fe7c-11ea-8512-69f90cb65e48.gif"
alt="LEVANA GIF"
/>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 700;
canvas.height = 200;

ctx.fillStyle="#fff";
ctx.font="bold 90px Arial";
ctx.textAlign="center";
ctx.fillText("LEVANA", canvas.width/2,130);

const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
ctx.clearRect(0,0,canvas.width,canvas.height);

let particles = [];
let phase="idle";
let timer=0;

const gap = 3;

for(let y=0;y<canvas.height;y+=gap){
for(let x=0;x<canvas.width;x+=gap){

let i=(y*canvas.width + x)*4;

if(imageData.data[i+3] > 120){

particles.push({
x:x,
y:y,
ox:x,
oy:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6
});

}

}
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#fff";

particles.forEach(p=>{

if(phase==="spread"){
p.x+=p.vx;
p.y+=p.vy;
}

if(phase==="return"){
p.x+=(p.ox-p.x)*0.06;
p.y+=(p.oy-p.y)*0.06;
}

ctx.beginPath();
ctx.arc(p.x,p.y,1.2,0,Math.PI*2);
ctx.fill();

});

timer++;

if(timer===120) phase="spread";
if(timer===240) phase="return";
if(timer===420){
phase="idle";
timer=0;
particles.forEach(p=>{
p.x=p.ox;
p.y=p.oy;
});
}

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
